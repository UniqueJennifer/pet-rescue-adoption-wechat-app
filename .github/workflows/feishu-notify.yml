name: Feishu Notify

on:
  push:
    branches:
      - main
      - current-wechat-project
      - "feature/**"
  pull_request:
    types: [opened, reopened, synchronize, closed]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Feishu notification
        shell: bash
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          webhook = os.environ.get("FEISHU_WEBHOOK", "")
          if not webhook:
              raise SystemExit("Missing repository secret: FEISHU_WEBHOOK")

          text = (
              f"GitHub 代码有新变更：{os.environ['REPOSITORY']}\n"
              f"事件：{os.environ['EVENT_NAME']}\n"
              f"分支：{os.environ['BRANCH']}\n"
              f"提交人：{os.environ['ACTOR']}\n"
              f"内容：{os.environ.get('COMMIT_MESSAGE', '')}\n"
              f"查看：https://github.com/{os.environ['REPOSITORY']}/actions/runs/{os.environ['RUN_ID']}"
          )
          request = urllib.request.Request(
              webhook,
              data=json.dumps({"msg_type": "text", "content": {"text": text}}).encode("utf-8"),
              headers={"Content-Type": "application/json"},
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              if response.status >= 300:
                  raise SystemExit(f"Feishu webhook returned HTTP {response.status}")
          PY
